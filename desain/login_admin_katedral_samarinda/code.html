<style>
        .glass-panel {
            background: rgba(247, 243, 235, 0.85); /* Soft Champagne */
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .diffused-shadow {
            box-shadow: 0 4px 20px rgba(45, 45, 45, 0.04);
        }
    </style>

<body class="bg-background min-h-screen flex items-center justify-center font-body-md text-body-md text-on-background antialiased relative overflow-hidden">
<!-- Subtle Background Elements -->
<div class="absolute inset-0 pointer-events-none overflow-hidden flex items-center justify-center opacity-30">
<div class="w-[800px] h-[800px] rounded-full border border-outline-variant/20 absolute"></div>
<div class="w-[600px] h-[600px] rounded-full border border-outline-variant/30 absolute"></div>
<div class="w-[400px] h-[400px] rounded-full border border-outline-variant/40 absolute"></div>
</div>
<!-- Login Container -->
<main class="w-full max-w-md px-margin-mobile md:px-0 relative z-10">
<div class="glass-panel diffused-shadow rounded-xl p-stack-md flex flex-col gap-stack-md">
<!-- Branding Header -->
<header class="text-center flex flex-col items-center gap-unit">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="church">church</span>
<h1 class="font-display-lg text-headline-md text-primary mt-4">Katedral Samarinda</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Portal Administrasi Sistem</p>
</header>
<!-- Login Form -->
<form action="#" class="flex flex-col gap-gutter" method="POST">
<!-- Username Input -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-widest" for="username">Nama Pengguna</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline" data-icon="person">person</span>
<input class="w-full bg-[#f4f3f1] border-0 border-b border-primary/30 rounded-t-DEFAULT pl-12 pr-4 py-3 text-on-background focus:ring-0 focus:border-primary focus:bg-[#efeeeb] transition-colors duration-300 placeholder:text-outline-variant outline-none font-body-md text-body-md" id="username" name="username" placeholder="Masukkan ID Admin" required="" type="text"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-widest" for="password">Kata Sandi</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline" data-icon="lock">lock</span>
<input class="w-full bg-[#f4f3f1] border-0 border-b border-primary/30 rounded-t-DEFAULT pl-12 pr-12 py-3 text-on-background focus:ring-0 focus:border-primary focus:bg-[#efeeeb] transition-colors duration-300 placeholder:text-outline-variant outline-none font-body-md text-body-md" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button aria-label="Tampilkan kata sandi" class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors cursor-pointer" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined" data-icon="visibility" id="visibilityIcon">visibility</span>
</button>
</div>
</div>
<!-- Remember Me & Forgot Password -->
<div class="flex items-center justify-between mt-2">
<label class="flex items-center gap-2 cursor-pointer group">
<input class="w-4 h-4 rounded border-outline-variant text-primary focus:ring-primary/50 focus:ring-offset-background bg-transparent checked:bg-primary transition-all" type="checkbox"/>
<span class="font-caption text-caption text-on-surface-variant group-hover:text-on-background transition-colors">Ingat Saya</span>
</label>
<a class="font-caption text-caption text-primary hover:text-on-primary-container transition-colors" href="#">Lupa Kata Sandi?</a>
</div>
<!-- Submit Action -->
<button class="w-full bg-primary text-on-primary rounded-lg py-4 font-label-md text-label-md uppercase tracking-wider hover:bg-primary-container hover:text-on-primary-container transition-all duration-300 mt-4 flex justify-center items-center gap-2 group" type="submit">
<span>Masuk</span>
<span class="material-symbols-outlined text-sm group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Footer Text -->
<div class="text-center mt-4">
<p class="font-caption text-caption text-outline">
                    Akses terbatas untuk petugas terdaftar.<br/>
<span class="opacity-70 mt-1 block">Silakan hubungi administrator paroki jika menemui kendala.</span>
</p>
</div>
</div>
</main>
<script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const visibilityIcon = document.getElementById('visibilityIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                visibilityIcon.textContent = 'visibility_off';
                visibilityIcon.setAttribute('data-icon', 'visibility_off');
            } else {
                passwordInput.type = 'password';
                visibilityIcon.textContent = 'visibility';
                visibilityIcon.setAttribute('data-icon', 'visibility');
            }
        }
    </script>
